services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: prototipo-mamografia-app:local
    container_name: mamografias_web
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Prototipo de Analisis Mamografico}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:5000}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-52428800}
      UPLOAD_FOLDER: /app/storage/uploads
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 5000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mamografias_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1234}@db:5432/${POSTGRES_DB:-mamografias_db}
      JULIA_EXECUTABLE: julia
      SIMULATOR_PROJECT_PATH: /app/simulator
      SIMULATOR_RUN_SCRIPT_PATH: /app/simulator/scripts/run_case.jl
      SIMULATION_DEFAULT_SEED: ${SIMULATION_DEFAULT_SEED:-1234}
      SIMULATION_DEFAULT_STEPS: ${SIMULATION_DEFAULT_STEPS:-500}
      SIMULATION_DEFAULT_DENSITY: ${SIMULATION_DEFAULT_DENSITY:-0.25}
      SIMULATION_DEFAULT_N0: ${SIMULATION_DEFAULT_N0:-10}
      SIMULATION_DEFAULT_MASS: ${SIMULATION_DEFAULT_MASS:-1}
      SIMULATION_DEFAULT_KBT: ${SIMULATION_DEFAULT_KBT:-1}
      SIMULATION_DEFAULT_TAU: ${SIMULATION_DEFAULT_TAU:-1}
      SIMULATION_DEFAULT_ROTATION_ANGLE: ${SIMULATION_DEFAULT_ROTATION_ANGLE:-1.5707963267948966}
      SIMULATION_DEFAULT_REALIZATIONS: ${SIMULATION_DEFAULT_REALIZATIONS:-3}
      SIMULATION_DEFAULT_LABELED_PARTICLES: ${SIMULATION_DEFAULT_LABELED_PARTICLES:-500}
      SIMULATION_CORRELATION_INITIAL_TIMES: ${SIMULATION_CORRELATION_INITIAL_TIMES:-50}
      SIMULATION_DEFAULT_OUTPUT_TIMES: ${SIMULATION_DEFAULT_OUTPUT_TIMES:-0,100,500}
      SIMULATION_GRID_SHIFT_ENABLED: ${SIMULATION_GRID_SHIFT_ENABLED:-false}
      SIMULATION_TIMEOUT_SECONDS: ${SIMULATION_TIMEOUT_SECONDS:-0}
      SIMULATION_CPU_THREADS: ${SIMULATION_CPU_THREADS:-6}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      SIMULATION_QUEUE_NAME: ${SIMULATION_QUEUE_NAME:-simulation_jobs}
      MAIL_BACKEND: ${MAIL_BACKEND:-console}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_USERNAME: ${MAIL_SMTP_USERNAME:-}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD:-}
      MAIL_SMTP_USE_TLS: ${MAIL_SMTP_USE_TLS:-true}
      MAIL_SENDER: ${MAIL_SENDER:-}
      PASSWORD_RESET_TOKEN_MAX_AGE: ${PASSWORD_RESET_TOKEN_MAX_AGE:-3600}
    ports:
      - "${WEB_PORT:-5000}:5000"
    volumes:
      - ./storage/uploads:/app/storage/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: prototipo-mamografia-app:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mamografias_worker
    restart: unless-stopped
    entrypoint: ["python3", "worker/worker.py"]
    command: ["listen"]
    # Limite duro de cores que el worker puede usar en el host. Red de seguridad para que
    # la simulacion no deje la maquina inutilizable. Ajustar segun la maquina (en el
    # servidor se puede subir o quitar). Conviene mantenerlo alineado con SIMULATION_CPU_THREADS.
    deploy:
      resources:
        limits:
          cpus: "${WORKER_CPU_LIMIT:-6}"
    environment:
      APP_NAME: ${APP_NAME:-Prototipo de Analisis Mamografico}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:5000}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-52428800}
      UPLOAD_FOLDER: /app/storage/uploads
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mamografias_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1234}@db:5432/${POSTGRES_DB:-mamografias_db}
      JULIA_EXECUTABLE: julia
      SIMULATOR_PROJECT_PATH: /app/simulator
      SIMULATOR_RUN_SCRIPT_PATH: /app/simulator/scripts/run_case.jl
      SIMULATION_DEFAULT_SEED: ${SIMULATION_DEFAULT_SEED:-1234}
      SIMULATION_DEFAULT_STEPS: ${SIMULATION_DEFAULT_STEPS:-500}
      SIMULATION_DEFAULT_DENSITY: ${SIMULATION_DEFAULT_DENSITY:-0.25}
      SIMULATION_DEFAULT_N0: ${SIMULATION_DEFAULT_N0:-10}
      SIMULATION_DEFAULT_MASS: ${SIMULATION_DEFAULT_MASS:-1}
      SIMULATION_DEFAULT_KBT: ${SIMULATION_DEFAULT_KBT:-1}
      SIMULATION_DEFAULT_TAU: ${SIMULATION_DEFAULT_TAU:-1}
      SIMULATION_DEFAULT_ROTATION_ANGLE: ${SIMULATION_DEFAULT_ROTATION_ANGLE:-1.5707963267948966}
      SIMULATION_DEFAULT_REALIZATIONS: ${SIMULATION_DEFAULT_REALIZATIONS:-3}
      SIMULATION_DEFAULT_LABELED_PARTICLES: ${SIMULATION_DEFAULT_LABELED_PARTICLES:-500}
      SIMULATION_CORRELATION_INITIAL_TIMES: ${SIMULATION_CORRELATION_INITIAL_TIMES:-50}
      SIMULATION_DEFAULT_OUTPUT_TIMES: ${SIMULATION_DEFAULT_OUTPUT_TIMES:-0,100,500}
      SIMULATION_GRID_SHIFT_ENABLED: ${SIMULATION_GRID_SHIFT_ENABLED:-false}
      SIMULATION_TIMEOUT_SECONDS: ${SIMULATION_TIMEOUT_SECONDS:-0}
      SIMULATION_CPU_THREADS: ${SIMULATION_CPU_THREADS:-6}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      SIMULATION_QUEUE_NAME: ${SIMULATION_QUEUE_NAME:-simulation_jobs}
      MAIL_BACKEND: ${MAIL_BACKEND:-console}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_USERNAME: ${MAIL_SMTP_USERNAME:-}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD:-}
      MAIL_SMTP_USE_TLS: ${MAIL_SMTP_USE_TLS:-true}
      MAIL_SENDER: ${MAIL_SENDER:-}
      PASSWORD_RESET_TOKEN_MAX_AGE: ${PASSWORD_RESET_TOKEN_MAX_AGE:-3600}
    volumes:
      - ./storage/uploads:/app/storage/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: mamografias_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mamografias_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-mamografias_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mamografias_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
