name: Validacion continua

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Pruebas Python y seguridad
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Obtener codigo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Configurar Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.13.5
          cache: pip
          cache-dependency-path: web/requirements.lock.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r web/requirements.lock.txt
          python -m pip check

      - name: Verificar que no existan secretos versionados
        run: python deploy/check_repository_secrets.py

      - name: Ejecutar pruebas Python
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/web
        run: python -m unittest discover -s web/tests -v

      - name: Comprobar sintaxis Python
        run: python -m compileall -q web worker deploy

  julia:
    name: Pruebas del simulador Julia
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Obtener codigo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Configurar Julia
        uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9
        with:
          version: 1.12.6

      - name: Instalar dependencias Julia
        run: julia --project=simulator -e 'using Pkg; Pkg.instantiate()'

      - name: Ejecutar pruebas Julia
        run: julia --project=simulator simulator/test/runtests.jl

  containers:
    name: Construccion de contenedores
    needs:
      - python
      - julia
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Obtener codigo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Construir imagen web sin publicar
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile.web
          push: false
          build-args: APP_VERSION=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Construir imagen worker sin publicar
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          push: false
          build-args: APP_VERSION=${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
